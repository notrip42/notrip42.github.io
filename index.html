<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch-Preserved Audio Shifter</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
            margin: 0; background: #1a1a1a; color: #fff; 
        }
        .card { 
            background: #242424; padding: 2.5rem; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; 
            width: 100%; max-width: 400px; border: 1px solid #333; 
        }
        h2 { color: #4ade80; margin-top: 0; }
        .input-group { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        input[type="number"] { width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        input[type="file"] { margin-top: 10px; width: 100%; }
        button { background: #4ade80; color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; }
        button:disabled { background: #444; color: #777; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 0.85rem; color: #4ade80; }
    </style>
</head>
<body>

<div class="card">
    <h2>WAV Pitch Fixer</h2>
    <div class="input-group">
        <label>Intended Playback Speed (e.g. 0.222):</label>
        <input type="number" id="targetSpeed" value="0.222" step="0.001">
        <label style="margin-top: 15px;">Upload Audio:</label>
        <input type="file" id="audioInput" accept="audio/*">
    </div>
    <button id="processBtn" disabled>Download Sped-Up .WAV</button>
    <div id="status">Select a file...</div>
</div>

<script>
    const audioInput = document.getElementById('audioInput');
    const speedInput = document.getElementById('targetSpeed');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');

    let originalBuffer;

    audioInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        status.textContent = "Loading...";
        const arrayBuffer = await file.arrayBuffer();
        const audioCtx = new AudioContext();
        originalBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        status.textContent = "Ready.";
        processBtn.disabled = false;
    };

    processBtn.onclick = async () => {
        const targetSpeed = parseFloat(speedInput.value);
        const RATIO = 1 / targetSpeed;
        status.textContent = "Processing with Pitch Correction...";
        processBtn.disabled = true;

        const offlineCtx = new OfflineAudioContext(
            originalBuffer.numberOfChannels,
            Math.floor(originalBuffer.length / RATIO), 
            originalBuffer.sampleRate
        );

        const source = offlineCtx.createBufferSource();
        source.buffer = originalBuffer;
        
        // SPEED UP LOGIC
        source.playbackRate.value = RATIO;
        
        // PITCH CORRECTION LOGIC
        // This keeps the song in the same key while speeding up
        if ('preservesPitch' in source) {
            source.preservesPitch = true;
        }

        source.connect(offlineCtx.destination);
        source.start();

        const renderedBuffer = await offlineCtx.startRendering();
        downloadWav(renderedBuffer, targetSpeed);
        
        status.textContent = "Done!";
        processBtn.disabled = false;
    };

    function downloadWav(buffer, speed) {
        const wavBlob = bufferToWav(buffer);
        const url = URL.createObjectURL(wavBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `sped_up_for_${speed}x.wav`;
        a.click();
    }

    function bufferToWav(buffer) {
        let numChannels = buffer.numberOfChannels,
            sampleRate = buffer.sampleRate,
            format = 1, bitDepth = 16,
            bytesPerSample = bitDepth / 8,
            blockAlign = numChannels * bytesPerSample,
            bufferLength = buffer.length * blockAlign,
            headerLength = 44,
            wavBuffer = new ArrayBuffer(headerLength + bufferLength),
            view = new DataView(wavBuffer);

        const writeString = (offset, string) => {
            for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
        };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + bufferLength, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * blockAlign, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitDepth, true);
        writeString(36, 'data');
        view.setUint32(40, bufferLength, true);

        let offset = 44;
        for (let i = 0; i < buffer.length; i++) {
            for (let channel = 0; channel < numChannels; channel++) {
                let sample = buffer.getChannelData(channel)[i];
                sample = Math.max(-1, Math.min(1, sample));
                sample = sample < 0 ? sample * 32768 : sample * 32767;
                view.setInt16(offset, sample, true);
                offset += 2;
            }
        }
        return new Blob([wavBuffer], { type: 'audio/wav' });
    }
</script>

</body>
</html>
