<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Speed Factor 4.5045x</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #0f0f0f; color: #e0e0e0; margin: 0; }
        .container { background: #1a1a1a; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); text-align: center; border: 1px solid #333; width: 350px; }
        h2 { color: #00d4ff; margin-bottom: 0.5rem; }
        p { font-size: 0.85rem; color: #888; margin-bottom: 1.5rem; }
        input[type="file"] { margin: 20px 0; font-size: 0.8rem; width: 100%; }
        button { background: #00d4ff; color: #000; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: transform 0.1s, background 0.2s; width: 100%; }
        button:hover { background: #00b8e6; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #00d4ff; font-weight: 500; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Speeder 0.222</h2>
    <p>Renders at 1/0.222 speed for perfect restoration.</p>
    <input type="file" id="audioInput" accept="audio/*">
    <br>
    <button id="processBtn">Process & Download</button>
    <div id="status">Ready</div>
</div>

<script>
    const audioInput = document.getElementById('audioInput');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');

    processBtn.addEventListener('click', async () => {
        if (!audioInput.files[0]) return alert("Please select a file first!");

        const file = audioInput.files[0];
        processBtn.disabled = true;
        status.innerText = "Reading file...";
        
        const arrayBuffer = await file.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        status.innerText = "Decoding...";
        const decodedData = await audioCtx.decodeAudioData(arrayBuffer);

        // Speed Factor: 1 / 0.222 = ~4.5045045
        const speedFactor = 1 / 0.222; 
        const newLength = Math.floor(decodedData.length / speedFactor);
        
        const offlineCtx = new OfflineAudioContext(
            decodedData.numberOfChannels,
            newLength,
            decodedData.sampleRate
        );

        const source = offlineCtx.createBufferSource();
        source.buffer = decodedData;
        
        // Key for "Clean" sound: Resampling via playbackRate
        source.playbackRate.value = speedFactor;

        source.connect(offlineCtx.destination);
        source.start(0);

        status.innerText = "Processing (Speeding up)...";
        const renderedBuffer = await offlineCtx.startRendering();

        status.innerText = "Encoding to WAV...";
        const wavBlob = bufferToWav(renderedBuffer);
        
        const url = URL.createObjectURL(wavBlob);
        const anchor = document.createElement('a');
        anchor.href = url;
        
        // Custom naming convention: originalName-0.222.wav
        const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
        anchor.download = `${originalName}-0.222.wav`;
        
        anchor.click();

        status.innerText = "Done!";
        processBtn.disabled = false;
        
        setTimeout(() => { status.innerText = "Ready"; }, 3000);
    });

    function bufferToWav(abuffer) {
        let numOfChan = abuffer.numberOfChannels,
            length = abuffer.length * numOfChan * 2 + 44,
            buffer = new ArrayBuffer(length),
            view = new DataView(buffer),
            channels = [], i, sample,
            offset = 0, pos = 0;

        function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
        function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
        setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
        setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164);
        setUint32(length - pos - 4);

        for(i = 0; i < numOfChan; i++) channels.push(abuffer.getChannelData(i));
        while(pos < length) {
            for(i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset]));
                sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
                view.setInt16(pos, sample, true);
                pos += 2;
            }
            offset++;
        }
        return new Blob([buffer], {type: "audio/wav"});
    }
</script>

</body>
</html>
