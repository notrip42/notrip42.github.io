<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Audio Speed Processor</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
            margin: 0; background: #121212; color: #eee; 
        }
        .card { 
            background: #1e1e1e; padding: 2.5rem; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; 
            width: 100%; max-width: 420px; border: 1px solid #333; 
        }
        h2 { margin-top: 0; color: #00d4ff; }
        .info { font-size: 0.95rem; color: #aaa; margin-bottom: 20px; line-height: 1.4; }
        
        .input-group {
            background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 20px;
            text-align: left;
        }
        .input-group label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 8px; }
        .input-group input[type="number"] {
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #444;
            background: #121212; color: #fff; font-size: 1rem; box-sizing: border-box;
        }
        .input-group input[type="file"] { width: 100%; color: #ddd; margin-top: 5px; }
        
        #multiplier-display { font-weight: bold; color: #00d4ff; display: block; margin-top: 10px; text-align: center;}
        
        button { 
            background: #00d4ff; color: #000; border: none; padding: 14px 24px; 
            border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; 
            transition: transform 0.2s, background 0.2s; width: 100%; 
        }
        button:hover:not(:disabled) { background: #00b8e6; transform: translateY(-1px); }
        button:disabled { background: #444; color: #777; cursor: not-allowed; }
        
        #status { margin-top: 20px; font-size: 0.9rem; height: 1.2em; color: #bbb; }
    </style>
</head>
<body>

<div class="card">
    <h2>Audio Speed Inverter</h2>
    <div class="info">
        Enter the speed you plan to play the audio at later. The tool will speed it up perfectly to match.
    </div>
    
    <div class="input-group">
        <label for="targetSpeed">Intended Playback Speed (e.g., 0.222, 0.5):</label>
        <input type="number" id="targetSpeed" value="0.222" step="0.001" min="0.01">
        <span id="multiplier-display">Processing multiplier: 4.50x</span>
    </div>

    <div class="input-group">
        <label for="audioInput">Upload Audio File:</label>
        <input type="file" id="audioInput" accept="audio/*">
    </div>

    <button id="processBtn" disabled>Process & Download .WAV</button>
    <div id="status">Select an audio file to begin.</div>
</div>

<script>
    const audioInput = document.getElementById('audioInput');
    const speedInput = document.getElementById('targetSpeed');
    const multiplierDisplay = document.getElementById('multiplier-display');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');

    let originalBuffer;

    // Update the visual multiplier when the user types a new speed
    speedInput.addEventListener('input', () => {
        const speed = parseFloat(speedInput.value);
        if (speed > 0) {
            const multiplier = 1 / speed;
            multiplierDisplay.textContent = `Processing multiplier: ${multiplier.toFixed(2)}x`;
        } else {
            multiplierDisplay.textContent = "Invalid speed";
        }
    });

    // Handle file upload
    audioInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.textContent = "Reading file...";
        const arrayBuffer = await file.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        try {
            originalBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            status.textContent = "Ready to process.";
            processBtn.disabled = false;
        } catch (err) {
            status.textContent = "Error loading audio file.";
        }
    };

    // Handle processing and download
    processBtn.onclick = async () => {
        const targetSpeed = parseFloat(speedInput.value);
        if (!targetSpeed || targetSpeed <= 0) {
            alert("Please enter a valid speed greater than 0.");
            return;
        }

        const RATIO = 1 / targetSpeed;
        status.textContent = `Processing at ${RATIO.toFixed(2)}x... please wait.`;
        processBtn.disabled = true;

        // Create offline context for rendering
        const offlineCtx = new OfflineAudioContext(
            originalBuffer.numberOfChannels,
            Math.floor(originalBuffer.length / RATIO), 
            originalBuffer.sampleRate
        );

        const source = offlineCtx.createBufferSource();
        source.buffer = originalBuffer;
        source.playbackRate.value = RATIO;

        source.connect(offlineCtx.destination);
        source.start();

        // Render to buffer
        const renderedBuffer = await offlineCtx.startRendering();
        
        // Convert to WAV and Download
        status.textContent = "Encoding file...";
        const wavBlob = bufferToWav(renderedBuffer);
        const url = URL.createObjectURL(wavBlob);
        
        const link = document.createElement('a');
        link.href = url;
        link.download = `inverted_${targetSpeed}x_speed.wav`;
        link.click();

        status.textContent = "Success! File downloaded.";
        processBtn.disabled = false;
    };

    // Helper: AudioBuffer to WAV Blob
    function bufferToWav(buffer) {
        const numChannels = buffer.numberOfChannels;
        const sampleRate = buffer.sampleRate;
        const format = 1; // PCM
        const bitDepth = 16;
        
        const bytesPerSample = bitDepth / 8;
        const blockAlign = numChannels * bytesPerSample;
        
        const bufferLength = buffer.length * blockAlign;
        const headerLength = 44;
        const wavBuffer = new ArrayBuffer(headerLength + bufferLength);
        const view = new DataView(wavBuffer);
        
        const writeString = (offset, string) => {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + bufferLength, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * blockAlign, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitDepth, true);
        writeString(36, 'data');
        view.setUint32(40, bufferLength, true);

        let offset = 44;
        for (let i = 0; i < buffer.length; i++) {
            for (let channel = 0; channel < numChannels; channel++) {
                let sample = buffer.getChannelData(channel)[i];
                sample = Math.max(-1, Math.min(1, sample));
                sample = sample < 0 ? sample * 32768 : sample * 32767;
                view.setInt16(offset, sample, true);
                offset += 2;
            }
        }
        return new Blob([wavBuffer], { type: 'audio/wav' });
    }
</script>

</body>
</html>
