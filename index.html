<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedUp Precision</title>
    <style>
        :root {
            --primary: #1db954;
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --input-bg: #252525;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
        }

        h1 { font-weight: 800; margin-bottom: 2rem; letter-spacing: -1px; }

        .file-input-wrapper { margin-bottom: 2rem; }
        
        input[type="file"] {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            color: #888;
            border: 1px solid #333;
            cursor: pointer;
        }

        .control-group {
            margin-bottom: 2rem;
            text-align: center;
        }

        label { 
            display: block; 
            margin-bottom: 0.8rem; 
            color: #888; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        /* The Styled Text/Number Field */
        input[type="number"] {
            background: var(--input-bg);
            border: 1px solid #444;
            color: var(--primary);
            font-size: 2rem;
            font-weight: bold;
            padding: 10px;
            border-radius: 12px;
            width: 120px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
        }

        /* Remove arrows from number input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .modes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 2rem;
        }

        .mode-btn {
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: black;
            font-weight: bold;
        }

        button#downloadBtn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 18px;
            border-radius: 35px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
        }

        button#downloadBtn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(29, 185, 84, 0.3); }
        #status { font-size: 0.8rem; margin-top: 1.5rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>SpeedUp</h1>

    <div class="file-input-wrapper">
        <input type="file" id="audioInput" accept="audio/*">
    </div>

    <div class="control-group">
        <label>Set Speed (e.g. 1.5, 5.0)</label>
        <input type="number" id="speedInput" value="1.0" step="0.1" min="0.1">
    </div>

    <label>Loudness Boost</label>
    <div class="modes">
        <button class="mode-btn active" data-gain="1.0">Normal</button>
        <button class="mode-btn" data-gain="5.0">Loud</button>
        <button class="mode-btn" data-gain="20.0">Max</button>
    </div>

    <button id="downloadBtn">Render & Download</button>
    <div id="status">Upload a song to begin.</div>
</div>

<script>
    let audioBuffer = null;
    let currentGain = 1.0;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const audioInput = document.getElementById('audioInput');
    const speedInput = document.getElementById('speedInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const status = document.getElementById('status');
    const modeBtns = document.querySelectorAll('.mode-btn');

    audioInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        status.innerText = "Decoding audio...";
        const arrayBuffer = await file.arrayBuffer();
        audioBuffer = await ctx.decodeAudioData(arrayBuffer);
        status.innerText = "Audio loaded.";
        downloadBtn.style.display = "block";
    });

    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGain = parseFloat(btn.getAttribute('data-gain'));
        });
    });

    downloadBtn.addEventListener('click', async () => {
        if (!audioBuffer) return;

        const speed = parseFloat(speedInput.value) || 1.0;
        const offlineCtx = new OfflineAudioContext(
            audioBuffer.numberOfChannels,
            audioBuffer.length / speed,
            audioBuffer.sampleRate
        );

        const source = offlineCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.playbackRate.value = speed;

        const gainNode = offlineCtx.createGain();
        gainNode.gain.value = currentGain;

        source.connect(gainNode);
        gainNode.connect(offlineCtx.destination);
        source.start(0);

        status.innerText = "Rendering sped-up file...";
        downloadBtn.disabled = true;

        const renderedBuffer = await offlineCtx.startRendering();
        downloadWav(renderedBuffer);
        
        status.innerText = "Done! Check your downloads.";
        downloadBtn.disabled = false;
    });

    function downloadWav(buffer) {
        const length = buffer.length * buffer.numberOfChannels * 2 + 44;
        const outBuffer = new ArrayBuffer(length);
        const view = new DataView(outBuffer);
        let offset = 0;

        const writeString = (s) => {
            for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i));
            offset += s.length;
        };

        writeString('RIFF');
        view.setUint32(offset, length - 8, true); offset += 4;
        writeString('WAVE');
        writeString('fmt ');
        view.setUint32(offset, 16, true); offset += 4;
        view.setUint16(offset, 1, true); offset += 2;
        view.setUint16(offset, buffer.numberOfChannels, true); offset += 2;
        view.setUint32(offset, buffer.sampleRate, true); offset += 4;
        view.setUint32(offset, buffer.sampleRate * 4, true); offset += 4;
        view.setUint16(offset, buffer.numberOfChannels * 2, true); offset += 2;
        view.setUint16(offset, 16, true); offset += 2;
        writeString('data');
        view.setUint32(offset, length - offset - 4, true); offset += 4;

        for (let i = 0; i < buffer.length; i++) {
            for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
                let s = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                offset += 2;
            }
        }

        const blob = new Blob([view], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `output_${speedInput.value}x.wav`;
        a.click();
    }
</script>

</body>
</html>
