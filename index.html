<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Speeder 0.222 + Preview</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #0b0e14; color: #e0e0e0; margin: 0; }
        .container { background: #161b22; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; border: 1px solid #30363d; width: 400px; }
        h2 { color: #58a6ff; margin: 0 0 10px 0; }
        .info { font-size: 0.8rem; color: #8b949e; margin-bottom: 20px; line-height: 1.4; }
        input[type="file"] { margin: 20px 0; font-size: 0.8rem; color: #c9d1d9; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { background: #238636; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { background: #2ea043; }
        button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; border: 1px solid #30363d; }
        #previewBtn { background: #1f6feb; }
        #previewBtn:hover { background: #388bfd; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #58a6ff; font-family: monospace; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Speeder 0.222</h2>
    <p class="info">Speeds up by 4.5045x.<br>Restores perfectly when played at 0.222x.</p>
    
    <input type="file" id="audioInput" accept="audio/*">
    
    <div class="btn-group">
        <button id="processBtn">Render & Download (.wav)</button>
        <button id="previewBtn" class="hidden">Play Restore Preview</button>
    </div>

    <div id="status">Ready</div>
</div>

<script>
    const audioInput = document.getElementById('audioInput');
    const processBtn = document.getElementById('processBtn');
    const previewBtn = document.getElementById('previewBtn');
    const status = document.getElementById('status');
    
    let processedBuffer = null;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let currentSource = null;

    processBtn.addEventListener('click', async () => {
        if (!audioInput.files[0]) return alert("Please select a file.");

        const file = audioInput.files[0];
        processBtn.disabled = true;
        status.innerText = "Processing...";

        const arrayBuffer = await file.arrayBuffer();
        const decodedData = await audioCtx.decodeAudioData(arrayBuffer);

        const speedFactor = 1 / 0.222; 
        const newLength = Math.floor(decodedData.length / speedFactor);
        
        const offlineCtx = new OfflineAudioContext(
            decodedData.numberOfChannels,
            newLength,
            decodedData.sampleRate
        );

        const source = offlineCtx.createBufferSource();
        source.buffer = decodedData;
        source.playbackRate.value = speedFactor; // Resampling (Speed + Pitch)
        source.connect(offlineCtx.destination);
        source.start(0);

        processedBuffer = await offlineCtx.startRendering();
        
        // Trigger Download
        const wavBlob = bufferToWav(processedBuffer);
        const url = URL.createObjectURL(wavBlob);
        const anchor = document.createElement('a');
        const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
        
        anchor.href = url;
        anchor.download = `${originalName}-0.222.wav`;
        anchor.click();

        status.innerText = "Download Started!";
        previewBtn.classList.remove('hidden');
        processBtn.disabled = false;
    });

    previewBtn.addEventListener('click', () => {
        if (currentSource) {
            currentSource.stop();
            currentSource = null;
            previewBtn.innerText = "Play Restore Preview";
            return;
        }

        // To "Restore" it, we play the high-speed buffer at 0.222x speed
        currentSource = audioCtx.createBufferSource();
        currentSource.buffer = processedBuffer;
        currentSource.playbackRate.value = 0.222; 
        currentSource.connect(audioCtx.destination);
        currentSource.start(0);
        
        previewBtn.innerText = "Stop Preview";
        currentSource.onended = () => {
            previewBtn.innerText = "Play Restore Preview";
            currentSource = null;
        };
    });

    function bufferToWav(abuffer) {
        let numOfChan = abuffer.numberOfChannels,
            length = abuffer.length * numOfChan * 2 + 44,
            buffer = new ArrayBuffer(length),
            view = new DataView(buffer),
            channels = [], i, sample, offset = 0, pos = 0;

        const setUint16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
        const setUint32 = (d) => { view.setUint32(pos, d, true); pos += 4; };

        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
        setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
        setUint32(abuffer.sampleRate); setUint32(abuffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164);
        setUint32(length - pos - 4);

        for(i = 0; i < numOfChan; i++) channels.push(abuffer.getChannelData(i));
        while(pos < length) {
            for(i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset]));
                sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF);
                view.setInt16(pos, sample, true);
                pos += 2;
            }
            offset++;
        }
        return new Blob([buffer], {type: "audio/wav"});
    }
</script>

</body>
</html>
