<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fixed Pitch WAV Shifter</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #333; width: 380px; }
        h2 { color: #00ffcc; margin-top: 0; }
        .box { background: #2a2a2a; padding: 15px; border-radius: 8px; margin: 20px 0; text-align: left; }
        input { width: 100%; padding: 8px; margin: 10px 0; background: #121212; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { background: #00ffcc; color: #121212; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h2>WAV Pitch Fixer</h2>
    <div class="box">
        <label>Intended Playback Speed:</label>
        <input type="number" id="targetSpeed" value="0.5" step="0.001">
        <label>Upload File:</label>
        <input type="file" id="audioInput" accept="audio/*">
    </div>
    <button id="processBtn" disabled>Fix Pitch & Download</button>
    <div id="status">Select a file to begin.</div>
</div>

<script>
    const audioInput = document.getElementById('audioInput');
    const speedInput = document.getElementById('targetSpeed');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');

    let originalBuffer;

    audioInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        status.textContent = "Decoding audio...";
        const arrayBuffer = await file.arrayBuffer();
        const audioCtx = new AudioContext();
        originalBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        status.textContent = "Ready.";
        processBtn.disabled = false;
    };

    processBtn.onclick = async () => {
        const targetSpeed = parseFloat(speedInput.value);
        const RATIO = 1 / targetSpeed;
        
        // Calculate the detune value needed to counteract the speed increase
        // The formula is: 1200 * log2(original_speed / new_speed)
        const detuneValue = -1200 * Math.log2(RATIO);

        status.textContent = "Processing pitch correction...";
        processBtn.disabled = true;

        const offlineCtx = new OfflineAudioContext(
            originalBuffer.numberOfChannels,
            Math.floor(originalBuffer.length / RATIO), 
            originalBuffer.sampleRate
        );

        const source = offlineCtx.createBufferSource();
        source.buffer = originalBuffer;
        
        // Apply speed
        source.playbackRate.value = RATIO;
        
        // Apply manual pitch correction via detune
        source.detune.value = detuneValue;

        source.connect(offlineCtx.destination);
        source.start();

        const renderedBuffer = await offlineCtx.startRendering();
        
        // Convert to WAV
        const wavBlob = bufferToWav(renderedBuffer);
        const url = URL.createObjectURL(wavBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `fixed_pitch_${targetSpeed}x.wav`;
        a.click();
        
        status.textContent = "Success! File downloaded.";
        processBtn.disabled = false;
    };

    function bufferToWav(buffer) {
        let n = buffer.numberOfChannels,
            s = buffer.sampleRate,
            f = 1, b = 16,
            ps = b / 8,
            ba = n * ps,
            bl = buffer.length * ba,
            hl = 44,
            ab = new ArrayBuffer(hl + bl),
            v = new DataView(ab);

        const ws = (o, str) => { for (let i = 0; i < str.length; i++) v.setUint8(o + i, str.charCodeAt(i)); };

        ws(0, 'RIFF');
        v.setUint32(4, 36 + bl, true);
        ws(8, 'WAVE');
        ws(12, 'fmt ');
        v.setUint32(16, 16, true);
        v.setUint16(20, f, true);
        v.setUint16(22, n, true);
        v.setUint32(24, s, true);
        v.setUint32(28, s * ba, true);
        v.setUint16(32, ba, true);
        v.setUint16(34, b, true);
        ws(36, 'data');
        v.setUint32(40, bl, true);

        let offset = 44;
        for (let i = 0; i < buffer.length; i++) {
            for (let c = 0; c < n; c++) {
                let sample = Math.max(-1, Math.min(1, buffer.getChannelData(c)[i]));
                v.setInt16(offset, sample < 0 ? sample * 32768 : sample * 32767, true);
                offset += 2;
            }
        }
        return new Blob([ab], { type: 'audio/wav' });
    }
</script>

</body>
</html>
