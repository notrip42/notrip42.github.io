<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedUp & Boost</title>
    <style>
        :root {
            --primary: #1db954;
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --accent: #ff4d4d;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.3s ease;
        }

        h1 { font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }

        .file-input-wrapper {
            margin-bottom: 1.5rem;
        }

        input[type="file"] {
            background: #252525;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
        }

        .control-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label { display: block; margin-bottom: 0.5rem; color: #bbb; font-size: 0.85rem; text-transform: uppercase; }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 5px;
            accent-color: var(--primary);
        }

        .speed-val { text-align: center; font-size: 1.5rem; font-weight: bold; margin: 10px 0; color: var(--primary); }

        .modes {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 2rem;
        }

        .mode-btn {
            background: #252525;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .mode-btn:hover:not(.active) { background: #333; }

        button#downloadBtn {
            background: var(--primary);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            display: none;
        }

        button#downloadBtn:hover { transform: scale(1.02); filter: brightness(1.1); }
        button#downloadBtn:disabled { background: #444; cursor: not-allowed; }

        #status { font-size: 0.8rem; margin-top: 1rem; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>SpeedUp</h1>
    <p>Render high-speed audio in seconds.</p>

    <div class="file-input-wrapper">
        <input type="file" id="audioInput" accept="audio/*">
    </div>

    <div class="control-group">
        <label>Speed: <span id="speedValue">1.0</span>x</label>
        <input type="range" id="speedRange" min="0.5" max="10.0" step="0.1" value="1.0">
    </div>

    <label>Loudness Mode</label>
    <div class="modes">
        <button class="mode-btn active" data-gain="1.0">Normal</button>
        <button class="mode-btn" data-gain="5.0">Loud</button>
        <button class="mode-btn" data-gain="20.0">EAR BLOWOUT</button>
    </div>

    <button id="downloadBtn">Render & Download</button>
    <div id="status"></div>
</div>

<script>
    let audioBuffer = null;
    let currentGain = 1.0;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const audioInput = document.getElementById('audioInput');
    const speedRange = document.getElementById('speedRange');
    const speedValue = document.getElementById('speedValue');
    const downloadBtn = document.getElementById('downloadBtn');
    const status = document.getElementById('status');
    const modeBtns = document.querySelectorAll('.mode-btn');

    // Handle File Upload
    audioInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "Loading audio...";
        const arrayBuffer = await file.arrayBuffer();
        audioBuffer = await ctx.decodeAudioData(arrayBuffer);
        
        status.innerText = "Ready to render.";
        downloadBtn.style.display = "block";
    });

    // Handle Speed UI
    speedRange.addEventListener('input', () => {
        speedValue.innerText = speedRange.value;
    });

    // Handle Loud Modes
    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGain = parseFloat(btn.getAttribute('data-gain'));
        });
    });

    // Rendering Engine
    downloadBtn.addEventListener('click', async () => {
        if (!audioBuffer) return;

        const speed = parseFloat(speedRange.value);
        const duration = audioBuffer.duration / speed;
        
        status.innerText = "Rendering... please wait.";
        downloadBtn.disabled = true;

        // Use Offline Context for rendering
        const offlineCtx = new OfflineAudioContext(
            audioBuffer.numberOfChannels,
            audioBuffer.length / speed,
            audioBuffer.sampleRate
        );

        const source = offlineCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.playbackRate.value = speed;

        const gainNode = offlineCtx.createGain();
        gainNode.gain.value = currentGain;

        source.connect(gainNode);
        gainNode.connect(offlineCtx.destination);
        source.start(0);

        const renderedBuffer = await offlineCtx.startRendering();
        downloadWav(renderedBuffer);
        
        status.innerText = "Download complete!";
        downloadBtn.disabled = false;
    });

    // Helper: Convert AudioBuffer to WAV format
    function downloadWav(buffer) {
        const length = buffer.length * buffer.numberOfChannels * 2 + 44;
        const outBuffer = new ArrayBuffer(length);
        const view = new DataView(outBuffer);
        let offset = 0;

        function writeString(s) {
            for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i));
            offset += s.length;
        }

        writeString('RIFF');
        view.setUint32(offset, length - 8, true); offset += 4;
        writeString('WAVE');
        writeString('fmt ');
        view.setUint32(offset, 16, true); offset += 4;
        view.setUint16(offset, 1, true); offset += 2;
        view.setUint16(offset, buffer.numberOfChannels, true); offset += 2;
        view.setUint32(offset, buffer.sampleRate, true); offset += 4;
        view.setUint32(offset, buffer.sampleRate * 4, true); offset += 4;
        view.setUint16(offset, buffer.numberOfChannels * 2, true); offset += 2;
        view.setUint16(offset, 16, true); offset += 2;
        writeString('data');
        view.setUint32(offset, length - offset - 4, true); offset += 4;

        for (let i = 0; i < buffer.length; i++) {
            for (let channel = 0; channel < buffer.numberOfChannels; channel++) {
                let sample = buffer.getChannelData(channel)[i];
                sample = Math.max(-1, Math.min(1, sample));
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                offset += 2;
            }
        }

        const blob = new Blob([view], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `sped_up_audio.wav`;
        a.click();
    }
</script>

</body>
</html>
